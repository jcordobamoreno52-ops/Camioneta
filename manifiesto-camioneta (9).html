<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Manifiesto de Ruta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EEEAE0;
    --surface:#FFFFFF;
    --surface-alt:#F6F3EC;
    --ink:#1E2A22;
    --ink-soft:#5B6B5F;
    --line:#D9D3C2;
    --accent:#3B6255;
    --accent-soft:#E4ECE6;
    --warn:#C97A2B;
    --warn-soft:#F6E7D8;
    --danger:#B23A32;
    --danger-soft:#F5E4E1;
    --free:#8FBF95;
    --scheduled:#D9A441;
    --full:#E2897C;
    --past:#7E9FC2;
    --past-soft:#E7ECF3;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html{
    overscroll-behavior-x: none;
  }
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'IBM Plex Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
    overscroll-behavior-x: none;
    touch-action: pan-y;
  }
  .wrap{
    max-width:920px;
    margin:0 auto;
    padding:20px 20px 60px;
  }

  /* Header / manifest plate */
  .plate{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:18px 20px;
    display:flex;
    flex-wrap:wrap;
    gap:16px;
    align-items:center;
    justify-content:space-between;
    margin-bottom:18px;
  }
  .plate-left{display:flex; align-items:center; gap:14px;}
  .plate-icon{
    width:44px; height:44px;
    border-radius:8px;
    background:var(--accent);
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .plate-icon svg{width:24px; height:24px; stroke:#fff;}
  .plate-title{
    font-family:'Barlow Condensed', sans-serif;
    font-weight:700;
    font-size:22px;
    letter-spacing:0.02em;
    text-transform:uppercase;
    line-height:1;
  }
  .plate-sub{
    font-size:12px;
    color:var(--ink-soft);
    margin-top:3px;
    font-family:'IBM Plex Mono', monospace;
  }
  .plate-fields{
    display:flex;
    gap:22px;
    flex-wrap:wrap;
  }
  .field{
    display:flex;
    flex-direction:column;
    gap:2px;
  }
  .field label{
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--ink-soft);
    font-weight:600;
  }
  .field input{
    border:none;
    border-bottom:1px solid var(--line);
    background:transparent;
    font-family:'IBM Plex Mono', monospace;
    font-size:14px;
    padding:2px 0;
    color:var(--ink);
    width:150px;
  }
  .field input:focus{ outline:none; border-bottom:1px solid var(--accent); }

  /* Month nav */
  .month-nav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:12px;
  }
  .month-title{
    font-family:'Barlow Condensed', sans-serif;
    font-size:30px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.01em;
  }
  .nav-btn{
    width:34px; height:34px;
    border-radius:8px;
    border:1px solid var(--line);
    background:var(--surface);
    color:var(--ink);
    font-size:16px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .nav-btn:hover{ background:var(--accent-soft); border-color:var(--accent); }

  /* Calendar */
  .weekdays{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:6px;
    margin-bottom:6px;
  }
  .weekdays div{
    text-align:center;
    font-size:11px;
    letter-spacing:0.08em;
    color:var(--ink-soft);
    font-weight:600;
    text-transform:uppercase;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:6px;
  }
  .day{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:8px;
    min-height:76px;
    padding:8px;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    transition:border-color .12s, transform .08s;
    position:relative;
    touch-action: manipulation;
  }
  .day:hover{ border-color:var(--accent); }
  .day:active{ transform:scale(0.98); }
  .day.empty{ background:transparent; border:none; cursor:default; }
  .day.today{ border-color:var(--accent); box-shadow:inset 0 0 0 1px var(--accent); }
  .day-num{
    font-family:'IBM Plex Mono', monospace;
    font-size:14px;
    font-weight:600;
  }
  .day-num.festivo{
    color:var(--full);
    font-weight:700;
  }
  .day-count{
    font-size:10px;
    color:var(--accent);
    font-weight:600;
    font-family:'IBM Plex Mono', monospace;
  }
  .status-line{
    height:4px;
    border-radius:3px;
    background:var(--free);
  }
  .status-line.scheduled{ background:var(--scheduled); }
  .status-line.full{ background:var(--full); }
  .status-line.past{ background:var(--past); }

  .legend{
    display:flex;
    flex-wrap:wrap;
    gap:14px;
    justify-content:center;
    margin-top:16px;
    padding-top:14px;
    border-top:1px solid var(--line);
  }
  .legend-item{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:11.5px;
    color:var(--ink-soft);
  }
  .legend .dot{
    width:9px; height:9px;
    border-radius:50%;
    flex-shrink:0;
  }

  .past-tag{
    display:inline-block;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    font-weight:600;
    color:var(--past);
    background:var(--past-soft);
    padding:3px 8px;
    border-radius:5px;
    margin-top:4px;
  }

  /* Header actions row */
  .actions-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    justify-content:flex-end;
    margin-bottom:14px;
  }
  .sync-dot{
    width:8px; height:8px;
    border-radius:50%;
    flex-shrink:0;
  }
  .sync-dot.on{ background:var(--free); }
  .sync-dot.off{ background:var(--ink-soft); }
  .week-btn{
    display:flex;
    align-items:center;
    gap:7px;
    padding:9px 16px;
    border-radius:8px;
    border:1px solid var(--accent);
    background:var(--accent-soft);
    color:var(--accent);
    font-weight:600;
    font-size:13px;
    cursor:pointer;
  }
  .week-btn:hover{ background:var(--accent); color:#fff; }
  .week-btn svg{ width:15px; height:15px; stroke:currentColor; }

  /* Modal */
  .overlay{
    position:fixed; inset:0;
    background:rgba(30,42,34,0.35);
    display:flex;
    align-items:flex-end;
    justify-content:center;
    z-index:50;
    padding:0;
  }
  @media(min-width:640px){
    .overlay{ align-items:center; padding:20px; }
  }
  .modal{
    background:var(--bg);
    width:100%;
    max-width:520px;
    max-height:88vh;
    overflow-y:auto;
    border-radius:16px 16px 0 0;
    border:1px solid var(--line);
    padding:20px;
  }
  @media(min-width:640px){
    .modal{ border-radius:14px; }
  }
  .modal-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:16px;
  }
  .modal-title{
    font-family:'Barlow Condensed', sans-serif;
    font-size:24px;
    font-weight:700;
    text-transform:uppercase;
  }
  .close-btn{
    width:30px;height:30px;
    border-radius:50%;
    border:1px solid var(--line);
    background:var(--surface);
    cursor:pointer;
    font-size:15px;
    color:var(--ink-soft);
  }

  .entry{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:8px;
    padding:10px 12px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:8px;
    gap:8px;
  }
  .entry-times{
    font-family:'IBM Plex Mono', monospace;
    font-size:14px;
    font-weight:600;
    color:var(--accent);
    white-space:nowrap;
  }
  .entry-main{ flex:1; padding:0 10px; min-width:0; }
  .entry-name{
    font-size:14px;
  }
  .entry-obs{
    font-size:12px;
    color:var(--ink-soft);
    font-style:italic;
    margin-top:2px;
  }
  .entry-actions{ display:flex; gap:6px; flex-shrink:0; }
  .icon-btn{
    border:none;
    background:transparent;
    cursor:pointer;
    font-size:13px;
    color:var(--ink-soft);
    padding:4px 6px;
    border-radius:6px;
  }
  .icon-btn:hover{ background:var(--surface-alt); color:var(--ink); }
  .icon-btn.danger:hover{ background:var(--danger-soft); color:var(--danger); }

  .empty-note{
    font-size:13px;
    color:var(--ink-soft);
    padding:14px 0;
    text-align:center;
  }

  .form-title{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--ink-soft);
    font-weight:600;
    margin:18px 0 8px;
  }
  .form-row{
    display:flex;
    gap:10px;
    margin-bottom:10px;
  }
  .form-row .field-block{ flex:1; }
  .field-block label{
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--ink-soft);
    font-weight:600;
    display:block;
    margin-bottom:4px;
  }
  .field-block input{
    width:100%;
    padding:9px 10px;
    border-radius:7px;
    border:1px solid var(--line);
    background:var(--surface);
    font-family:'IBM Plex Sans', sans-serif;
    font-size:14px;
    color:var(--ink);
  }
  .field-block input[type=time]{ font-family:'IBM Plex Mono', monospace; }
  .field-block input:focus, .field-block textarea:focus{ outline:none; border-color:var(--accent); }
  .field-block textarea{
    width:100%;
    padding:9px 10px;
    border-radius:7px;
    border:1px solid var(--line);
    background:var(--surface);
    font-family:'IBM Plex Sans', sans-serif;
    font-size:13px;
    color:var(--ink);
    resize:vertical;
    min-height:44px;
  }

  /* Selector de tipo de viaje */
  .tipo-selector{
    display:flex;
    gap:6px;
    margin-bottom:14px;
  }
  .tipo-btn{
    flex:1;
    padding:9px 6px;
    border-radius:7px;
    border:1px solid var(--line);
    background:var(--surface);
    color:var(--ink-soft);
    font-size:12.5px;
    font-weight:600;
    cursor:pointer;
    text-align:center;
  }
  .tipo-btn.active{
    background:var(--accent);
    border-color:var(--accent);
    color:#fff;
  }

  /* Selector de hora con listas desplegables (evita bugs de input[type=time] en Android) */
  .time-selects{
    display:flex;
    align-items:center;
    gap:4px;
  }
  .time-select{
    flex:1;
    padding:9px 4px;
    border-radius:7px;
    border:1px solid var(--line);
    background:var(--surface);
    color:var(--ink);
    font-family:'IBM Plex Mono', monospace;
    font-size:14px;
    text-align:center;
    -webkit-appearance:menulist;
    appearance:menulist;
  }
  .time-select:focus{ outline:none; border-color:var(--accent); }
  .time-ap{ flex:0.9; font-family:'IBM Plex Sans', sans-serif; font-size:12px; font-weight:600; }
  .time-colon{
    color:var(--ink-soft);
    font-weight:700;
    font-family:'IBM Plex Mono', monospace;
  }

  .alert{
    background:var(--warn-soft);
    border:1px solid var(--warn);
    color:#7A4A16;
    font-size:13px;
    padding:9px 11px;
    border-radius:7px;
    margin-bottom:10px;
    line-height:1.4;
  }

  .submit-btn{
    width:100%;
    padding:11px;
    border-radius:8px;
    border:none;
    background:var(--accent);
    color:#fff;
    font-weight:600;
    font-size:14px;
    cursor:pointer;
    margin-top:4px;
  }
  .submit-btn:hover{ filter:brightness(1.06); }
  .cancel-edit{
    width:100%;
    padding:8px;
    background:transparent;
    border:none;
    color:var(--ink-soft);
    font-size:12px;
    cursor:pointer;
    margin-top:6px;
  }

  .rule-note{
    font-size:11px;
    color:var(--ink-soft);
    margin-top:14px;
    text-align:center;
  }
  .loading{
    text-align:center;
    padding:40px;
    color:var(--ink-soft);
    font-size:13px;
  }

  /* Weekly schedule (screenshot-friendly) */
  .week-modal{ max-width:480px; }
  .week-nav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:14px;
  }
  .week-range{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:var(--ink-soft);
  }
  .week-sheet{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:12px;
    padding:20px;
  }
  .week-sheet-head{
    text-align:center;
    padding-bottom:14px;
    margin-bottom:14px;
    border-bottom:2px solid var(--ink);
  }
  .week-sheet-title{
    font-family:'Barlow Condensed', sans-serif;
    font-weight:700;
    font-size:22px;
    text-transform:uppercase;
    letter-spacing:0.02em;
  }
  .week-sheet-sub{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:var(--ink-soft);
    margin-top:4px;
  }
  .week-day-block{ margin-bottom:16px; }
  .week-day-block:last-child{ margin-bottom:0; }
  .week-day-name{
    font-family:'Barlow Condensed', sans-serif;
    font-weight:700;
    font-size:17px;
    text-transform:uppercase;
    color:var(--accent);
    border-left:3px solid var(--accent);
    padding-left:8px;
    margin-bottom:6px;
  }
  .week-trip{
    padding:6px 0 6px 11px;
    border-left:3px solid var(--line);
    margin-bottom:2px;
  }
  .week-trip-line{
    font-size:14.5px;
    line-height:1.4;
  }
  .week-trip-line b{ font-weight:600; }
  .week-trip-times{
    font-family:'IBM Plex Mono', monospace;
    color:var(--accent);
    font-weight:600;
  }
  .week-trip-obs{
    font-size:12.5px;
    color:var(--ink-soft);
    font-style:italic;
    margin-top:1px;
  }
  .week-empty{
    text-align:center;
    color:var(--ink-soft);
    font-size:13px;
    padding:20px 0;
  }
  .week-hint{
    text-align:center;
    font-size:11px;
    color:var(--ink-soft);
    margin-top:12px;
  }

  /* History */
  .history-search{
    width:100%;
    padding:10px 12px;
    border-radius:8px;
    border:1px solid var(--line);
    background:var(--surface);
    font-family:'IBM Plex Sans', sans-serif;
    font-size:14px;
    color:var(--ink);
    margin-bottom:14px;
  }
  .history-search:focus{ outline:none; border-color:var(--past); }
  .history-day{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:8px;
    padding:12px 14px;
    margin-bottom:10px;
  }
  .history-day-head{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    font-weight:600;
    color:var(--past);
    border-left:3px solid var(--past);
    padding-left:8px;
    margin-bottom:8px;
    text-transform:uppercase;
    letter-spacing:0.04em;
  }
  .history-trip{ margin-bottom:6px; }
  .history-trip:last-child{ margin-bottom:0; }
  .history-trip-line{
    font-size:14px;
    line-height:1.4;
  }
  .history-trip-line b{ font-weight:600; }
  .history-trip-times{
    font-family:'IBM Plex Mono', monospace;
    color:var(--ink-soft);
    font-weight:500;
  }
  .history-trip-obs{
    font-size:12.5px;
    color:var(--ink-soft);
    font-style:italic;
    margin-top:1px;
  }

  .cloud-steps{
    background:var(--surface-alt);
    border:1px solid var(--line);
    border-radius:8px;
    padding:12px 14px;
    font-size:13px;
    line-height:1.7;
    color:var(--ink);
    margin-bottom:14px;
  }
  .cloud-steps code{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:4px;
    padding:1px 5px;
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
  }
  .alert-ok{
    background:var(--accent-soft);
    border-color:var(--accent);
    color:var(--accent);
  }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="loading">Cargando el manifiesto…</div>
</div>

<script>
const MIN_GAP_MIN = 105; // 1h45
const MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const DIAS = ["Lun","Mar","Mié","Jue","Vie"];

let state = {
  vehiculo: { placa: "", conductor: "", telefono: "", cupo: 6 },
  reservas: {}, // { "YYYY-MM-DD": [ {id, nombre, salida, regreso, observacion} ] }
  viewYear: 2026,
  viewMonth: 6, // 0-indexed, July
  openDay: null,
  editingId: null,
  errorMsg: null,
  formTipo: 'ida_regreso',
  formDraft: null,
  loaded: false,
  weekOpen: false,
  weekStart: null, // Date (Monday) of the week being viewed
  historyOpen: false,
  historySearch: '',
  cloudOpen: false,
  cloudUrl: '',
  cloudKey: '',
  cloudStatus: 'idle', // idle | testing | ok | error
  cloudStatusMsg: ''
};

const today = new Date();
state.viewYear = today.getFullYear();
state.viewMonth = today.getMonth();

function pad(n){ return String(n).padStart(2,'0'); }
function dateKey(y,m,d){ return `${y}-${pad(m+1)}-${pad(d)}`; }
function toMin(t){ const [h,m] = t.split(':').map(Number); return h*60+m; }
function fmtRange(a,b){ return `${a} → ${b}`; }
function sortKey(e){ return toMin(e.salida || e.regreso || '00:00'); }
function fmtTrip(e, timeFn){
  const tipo = e.tipo || 'ida_regreso';
  if(tipo === 'ida') return `Ida ${timeFn(e.salida)}`;
  if(tipo === 'regreso') return `Regreso ${timeFn(e.regreso)}`;
  return `${timeFn(e.salida)} → ${timeFn(e.regreso)}`;
}
function fmt12(t){
  if(!t) return '';
  let [h,mm] = t.split(':').map(Number);
  if(h===12 && mm===0) return '12:00 m';
  if(h===0 && mm===0) return '12:00 a.m.';
  const period = h<12 ? 'am' : 'pm';
  let hh = h % 12; if(hh===0) hh = 12;
  return `${hh}:${pad(mm)}${period}`;
}
function getMonday(d){
  const date = new Date(d);
  const day = (date.getDay()+6)%7; // Monday=0
  date.setDate(date.getDate()-day);
  date.setHours(0,0,0,0);
  return date;
}

// Festivos oficiales de Colombia (2025-2026)
const FESTIVOS_CO = new Set([
  // 2025
  '2025-01-01','2025-01-06','2025-03-24','2025-04-17','2025-04-18',
  '2025-05-01','2025-06-02','2025-06-23','2025-06-30',
  '2025-07-20','2025-08-07','2025-08-18','2025-10-13',
  '2025-11-03','2025-11-17','2025-12-08','2025-12-25',
  // 2026
  '2026-01-01','2026-01-12','2026-03-23','2026-04-02','2026-04-03',
  '2026-05-01','2026-05-18','2026-06-08','2026-06-15','2026-06-29',
  '2026-07-13','2026-07-20','2026-08-07','2026-08-17','2026-10-12',
  '2026-11-02','2026-11-16','2026-12-08','2026-12-25'
]);
function isFestivo(key){ return FESTIVOS_CO.has(key); }

// --- Selector de hora personalizado (reemplaza <input type="time"> por selects, más confiable en Android) ---
function timeSelectHTML(prefix, value24){
  let h12 = 7, mm = 0, ap = 'AM';
  if(value24){
    const [H,M] = value24.split(':').map(Number);
    mm = M;
    ap = H < 12 ? 'AM' : 'PM';
    h12 = H % 12; if(h12 === 0) h12 = 12;
  }
  const hourOpts = Array.from({length:12},(_,i)=>i+1)
    .map(h=>`<option value="${h}" ${h===h12?'selected':''}>${h}</option>`).join('');
  const minOpts = Array.from({length:60},(_,i)=>pad(i))
    .map(m=>`<option value="${m}" ${m===pad(mm)?'selected':''}>${m}</option>`).join('');
  const apOpts = ['AM','PM'].map(a=>`<option value="${a}" ${a===ap?'selected':''}>${a}</option>`).join('');
  return `
    <div class="time-selects">
      <select id="${prefix}-h" class="time-select">${hourOpts}</select>
      <span class="time-colon">:</span>
      <select id="${prefix}-m" class="time-select">${minOpts}</select>
      <select id="${prefix}-ap" class="time-select time-ap">${apOpts}</select>
    </div>`;
}
function readTimeSelect(prefix){
  const hEl = document.getElementById(prefix+'-h');
  const mEl = document.getElementById(prefix+'-m');
  const apEl = document.getElementById(prefix+'-ap');
  if(!hEl || !mEl || !apEl) return null;
  let h = Number(hEl.value);
  const ap = apEl.value;
  if(ap==='AM'){ if(h===12) h=0; } else { if(h!==12) h+=12; }
  return `${pad(h)}:${mEl.value}`;
}

function getUniqueNombres(){

  Object.values(state.reservas).forEach(list=> list.forEach(e=>{ if(e.nombre) set.add(e.nombre.trim()); }));
  return Array.from(set).sort((a,b)=>a.localeCompare(b));
}
function getUniqueObservaciones(){

  return Array.from(set).sort((a,b)=>a.localeCompare(b));
}

function withTimeout(promise, ms){
  return Promise.race([
    promise,
    new Promise((resolve)=> setTimeout(()=>resolve(null), ms))
  ]);
}

function loadCloudConfig(){
  try{
    state.cloudUrl = localStorage.getItem('camioneta:cloud_url') || '';
    state.cloudKey = localStorage.getItem('camioneta:cloud_key') || '';
  }catch(e){ /* sin localStorage disponible */ }
}
function saveCloudConfig(url, key){
  state.cloudUrl = url.trim().replace(/\/+$/,'');
  state.cloudKey = key.trim();
  try{
    localStorage.setItem('camioneta:cloud_url', state.cloudUrl);
    localStorage.setItem('camioneta:cloud_key', state.cloudKey);
  }catch(e){ /* se ignora */ }
}
function cloudConfigured(){ return !!(state.cloudUrl && state.cloudKey); }

async function cloudFetch(path, options){
  const res = await fetch(state.cloudUrl + path, {
    ...options,
    headers: {
      'apikey': state.cloudKey,
      'Authorization': 'Bearer ' + state.cloudKey,
      'Content-Type': 'application/json',
      ...(options && options.headers ? options.headers : {})
    }
  });
  if(!res.ok) throw new Error('cloud http '+res.status);
  return res;
}

async function cloudGet(key){
  const res = await cloudFetch(`/rest/v1/app_storage?key=eq.${encodeURIComponent(key)}&select=value`, { method:'GET' });
  const data = await res.json();
  return (data && data[0]) ? data[0].value : null;
}
async function cloudSet(key, value){
  await cloudFetch('/rest/v1/app_storage', {
    method:'POST',
    headers:{ 'Prefer':'resolution=merge-duplicates' },
    body: JSON.stringify([{ key, value }])
  });
}
async function testCloudConnection(url, key){
  const cleanUrl = url.trim().replace(/\/+$/,'');
  const res = await fetch(cleanUrl + '/rest/v1/app_storage?select=key&limit=1', {
    headers:{ 'apikey': key.trim(), 'Authorization': 'Bearer ' + key.trim() }
  });
  if(!res.ok) throw new Error('http '+res.status);
  return true;
}

async function storageGet(key){
  if(cloudConfigured()){
    try{
      const v = await withTimeout(cloudGet(key), 5000);
      if(v !== null && v !== undefined) return v;
    }catch(e){ /* sigue a los respaldos */ }
  }
  try{
    if(window.storage){
      const r = await withTimeout(window.storage.get(key, false), 3500);
      if(r && r.value) return r.value;
    }
  }catch(e){ /* sigue al respaldo local */ }
  try{ return localStorage.getItem('camioneta:'+key); }
  catch(e){ return null; }
}
async function storageSet(key, value){
  if(cloudConfigured()){
    try{ await withTimeout(cloudSet(key, value), 5000); }
    catch(e){ /* aún así intenta los otros respaldos */ }
  }
  try{
    if(window.storage) await withTimeout(window.storage.set(key, value, false), 3500);
  }catch(e){ /* aún así intenta el respaldo local */ }
  try{ localStorage.setItem('camioneta:'+key, value); }
  catch(e){ /* entorno sin almacenamiento local, se ignora */ }
}

async function loadState(){
  loadCloudConfig();
  try{
    const v = await storageGet('vehiculo-info');
    if(v) state.vehiculo = { ...state.vehiculo, ...JSON.parse(v) };
  }catch(e){ /* not set yet */ }
  try{
    const r = await storageGet('reservas-todas');
    if(r) state.reservas = JSON.parse(r);
  }catch(e){ /* not set yet */ }
  state.loaded = true;
  render();
  startCloudPolling();
}

function startCloudPolling(){
  setInterval(async ()=>{
    if(!cloudConfigured()) return;
    if(state.openDay || state.weekOpen || state.historyOpen || state.cloudOpen) return; // no interrumpe si hay algo abierto
    try{
      const [v, r] = await Promise.all([
        withTimeout(cloudGet('vehiculo-info'), 5000),
        withTimeout(cloudGet('reservas-todas'), 5000)
      ]);
      let changed = false;
      if(v){ const parsed = { ...state.vehiculo, ...JSON.parse(v) }; if(JSON.stringify(parsed)!==JSON.stringify(state.vehiculo)){ state.vehiculo = parsed; changed = true; } }
      if(r){ if(r !== JSON.stringify(state.reservas)){ state.reservas = JSON.parse(r); changed = true; } }
      if(changed) render();
    }catch(e){ /* se ignora, se reintenta en el siguiente ciclo */ }
  }, 12000);
}

function getDay(key){ return state.reservas[key] || []; }

function checkConflict(key, tipo, salida, regreso, excludeId){
  const entries = getDay(key).filter(e => e.id !== excludeId);
  const hasSalida = tipo === 'ida' || tipo === 'ida_regreso';
  const hasRegreso = tipo === 'regreso' || tipo === 'ida_regreso';

  if(hasSalida && hasRegreso){
    if(toMin(regreso) <= toMin(salida)){
      return "La hora de regreso debe ser posterior a la hora de salida.";
    }
  }

  const sMin = hasSalida ? toMin(salida) : null;
  const rMin = hasRegreso ? toMin(regreso) : null;

  for(const e of entries){
    const eHasSalida = !e.tipo || e.tipo === 'ida' || e.tipo === 'ida_regreso';
    const eHasRegreso = !e.tipo || e.tipo === 'regreso' || e.tipo === 'ida_regreso';

    if(hasSalida && eHasSalida && e.salida){
      const diffS = Math.abs(toMin(e.salida) - sMin);
      if(diffS < MIN_GAP_MIN){
        return `Muy cerca de la salida de ${e.nombre} (${e.salida}). Deja al menos 1h45 entre salidas — la próxima disponible es ${addMin(e.salida, MIN_GAP_MIN)} o antes de ${subMin(e.salida, MIN_GAP_MIN)}.`;
      }
    }
    if(hasRegreso && eHasRegreso && e.regreso){
      const diffR = Math.abs(toMin(e.regreso) - rMin);
      if(diffR < MIN_GAP_MIN){
        return `Muy cerca del regreso de ${e.nombre} (${e.regreso}). Deja al menos 1h45 entre regresos — la próxima disponible es ${addMin(e.regreso, MIN_GAP_MIN)} o antes de ${subMin(e.regreso, MIN_GAP_MIN)}.`;
      }
    }
  }
  return null;
}
function addMin(t, mins){
  let total = toMin(t) + mins;
  total = ((total % 1440) + 1440) % 1440;
  return `${pad(Math.floor(total/60))}:${pad(total%60)}`;
}
function subMin(t, mins){
  let total = toMin(t) - mins;
  total = ((total % 1440) + 1440) % 1440;
  return `${pad(Math.floor(total/60))}:${pad(total%60)}`;
}

function startEdit(id){
  state.editingId = id;
  state.errorMsg = null;
  state.formDraft = null;
  const entry = getDay(state.openDay).find(e=>e.id===id);
  state.formTipo = (entry && entry.tipo) || 'ida_regreso';
  renderModal();
}
function cancelEdit(){
  state.editingId = null;
  state.errorMsg = null;
  state.formDraft = null;
  state.formTipo = 'ida_regreso';
  renderModal();
}

function deleteEntry(id){
  const key = state.openDay;
  state.reservas[key] = getDay(key).filter(e=>e.id!==id);
  if(state.reservas[key].length===0) delete state.reservas[key];
  saveReservas();
  render();
}

function submitEntry(){
  const key = state.openDay;
  const tipo = state.formTipo;
  const nombre = document.getElementById('f-nombre').value.trim();
  const observacion = document.getElementById('f-obs').value.trim();
  const salida = (tipo==='ida' || tipo==='ida_regreso') ? readTimeSelect('f-salida') : null;
  const regreso = (tipo==='regreso' || tipo==='ida_regreso') ? readTimeSelect('f-regreso') : null;

  if(!nombre){
    state.errorMsg = "Completa el nombre del funcionario.";
    renderModal();
    return;
  }

  const conflict = checkConflict(key, tipo, salida, regreso, state.editingId);
  if(conflict){
    state.errorMsg = conflict;
    renderModal();
    return;
  }

  if(!state.reservas[key]) state.reservas[key] = [];

  if(state.editingId){
    const idx = state.reservas[key].findIndex(e=>e.id===state.editingId);
    state.reservas[key][idx] = { ...state.reservas[key][idx], nombre, tipo, salida, regreso, observacion };
  } else {
    state.reservas[key].push({ id: 'r'+Date.now()+Math.random().toString(36).slice(2,6), nombre, tipo, salida, regreso, observacion });
  }

  state.editingId = null;
  state.errorMsg = null;
  state.formTipo = 'ida_regreso';
  state.formDraft = null;
  saveReservas();
  render();
}

function openWeek(){
  state.weekOpen = true;
  state.weekStart = getMonday(today);

function closeWeek(){

function changeWeek(delta){
  const d = new Date(state.weekStart);
  d.setDate(d.getDate() + delta*7);

function renderWeekModal(){
  const start = state.weekStart;
  const dayNamesLong = ["Lunes","Martes","Miércoles","Jueves","Viernes"];
  const weekDates = [];
  for(let i=0;i<5;i++){
    const d = new Date(start);
    d.setDate(d.getDate()+i);
    weekDates.push(d);
  }
  const rangeStr = `${weekDates[0].getDate()} ${MESES[weekDates[0].getMonth()].slice(0,3)} — ${weekDates[4].getDate()} ${MESES[weekDates[4].getMonth()].slice(0,3)} ${weekDates[4].getFullYear()}`;

  let dayBlocks = '';
  let anyTrip = false;
  weekDates.forEach((d,i)=>{
    const key = dateKey(d.getFullYear(), d.getMonth(), d.getDate());
    const entries = getDay(key).slice().sort((a,b)=>sortKey(a)-sortKey(b));
    if(entries.length === 0) return;
    anyTrip = true;
    dayBlocks += `
      <div class="week-day-block">
        <div class="week-day-name">${dayNamesLong[i]} · ${d.getDate()} ${MESES[d.getMonth()].slice(0,3)}</div>
        ${entries.map(e=>`
          <div class="week-trip">
            <div class="week-trip-line"><b>${e.nombre}</b> — <span class="week-trip-times">${fmtTrip(e, fmt12)}</span></div>
            ${e.observacion ? `<div class="week-trip-obs">${e.observacion}</div>` : ''}
          </div>
        `).join('')}
      </div>`;
  });

  let overlay = document.getElementById('week-overlay');
  if(!overlay){
    overlay = document.createElement('div');
    overlay.id = 'week-overlay';
    overlay.className = 'overlay';
    document.body.appendChild(overlay);
  }

  overlay.innerHTML = `
    <div class="modal week-modal">
      <div class="modal-head">
        <div>
          <div class="modal-title">Programación</div>
        </div>
        <button class="close-btn" onclick="closeWeek()">✕</button>
      </div>

      <div class="week-nav">
        <button class="nav-btn" onclick="changeWeek(-1)">‹</button>
        <div class="week-range">${rangeStr}</div>
        <button class="nav-btn" onclick="changeWeek(1)">›</button>
      </div>

      <div class="week-sheet">
        <div class="week-sheet-head">
          <div class="week-sheet-title">${state.vehiculo.placa || 'Camioneta'}</div>
          <div class="week-sheet-sub">${state.vehiculo.conductor ? 'Conductor: '+state.vehiculo.conductor : ''}</div>
        </div>
        ${anyTrip ? dayBlocks : `<div class="week-empty">Semana libre, sin viajes programados.</div>`}
      </div>

      <div class="week-hint">Toma la captura de esta tarjeta para enviarla al conductor</div>
    </div>
  `;
  overlay.onclick = (ev)=>{ if(ev.target === overlay) closeWeek(); };
}

function openCloud(){
  state.cloudOpen = true;
  state.cloudStatus = 'idle';
  state.cloudStatusMsg = '';
  render();
}
function closeCloud(){
  state.cloudOpen = false;
  const overlay = document.getElementById('cloud-overlay');
  if(overlay) overlay.remove();
  render();
}

async function onSaveCloud(){
  const url = document.getElementById('c-url').value;
  const key = document.getElementById('c-key').value;
  if(!url.trim() || !key.trim()){
    state.cloudStatus = 'error';
    state.cloudStatusMsg = 'Completa la URL y la clave (anon key).';
    renderCloudModal();
    return;
  }
  state.cloudStatus = 'testing';
  state.cloudStatusMsg = 'Probando conexión...';
  renderCloudModal();
  try{
    await testCloudConnection(url, key);
    saveCloudConfig(url, key);
    state.cloudStatus = 'ok';
    state.cloudStatusMsg = 'Conectado. Cargando la información compartida...';
    renderCloudModal();
    // Trae de inmediato lo que haya en la nube y lo fusiona
    try{
      const v = await cloudGet('vehiculo-info');
      if(v) state.vehiculo = { ...state.vehiculo, ...JSON.parse(v) };
      const r = await cloudGet('reservas-todas');
      if(r) state.reservas = JSON.parse(r);
    }catch(e){ /* si está vacía aún, no pasa nada */ }
    // Sube lo que ya tenía este dispositivo, por si la nube estaba vacía
    await saveVehiculo();
    await saveReservas();
    state.cloudStatusMsg = 'Listo, ya está sincronizado.';
    render();
  }catch(e){
    state.cloudStatus = 'error';
    state.cloudStatusMsg = 'No se pudo conectar. Revisa la URL y la clave, o si ya creaste la tabla en Supabase.';
    renderCloudModal();
  }
}

function onDisconnectCloud(){
  saveCloudConfig('', '');
  state.cloudStatus = 'idle';
  state.cloudStatusMsg = '';
  render();
}

function renderCloudModal(){
  let overlay = document.getElementById('cloud-overlay');
  if(!overlay){
    overlay = document.createElement('div');
    overlay.id = 'cloud-overlay';
    overlay.className = 'overlay';
    document.body.appendChild(overlay);
  }

  const connected = cloudConfigured();

  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-head">
        <div>
          <div class="modal-title">Nube compartida</div>
          <div style="font-size:12px; color:var(--ink-soft); margin-top:2px;">Para que el celular y el computador vean lo mismo</div>
        </div>
        <button class="close-btn" onclick="closeCloud()">✕</button>
      </div>

      ${connected ? `
        <div class="alert" style="background:var(--accent-soft); border-color:var(--accent); color:var(--accent);">
          Este dispositivo ya está conectado a la nube compartida.
        </div>
        <button class="cancel-edit" style="color:var(--danger);" onclick="onDisconnectCloud()">Desconectar este dispositivo</button>
        <div class="form-title" style="margin-top:16px;">Reemplazar datos de conexión</div>
      ` : `
        <div class="cloud-steps">
          <b>1.</b> Crea gratis un proyecto en <b>supabase.com</b>.<br>
          <b>2.</b> En SQL Editor, corre el script que crea la tabla <code>app_storage</code>.<br>
          <b>3.</b> Ve a Project Settings → API y copia la <b>Project URL</b> y la <b>anon public key</b>.<br>
          <b>4.</b> Pégalas aquí abajo y guarda. Repite este paso en cada dispositivo (celular y computador) con los mismos datos.
        </div>
      `}

      ${state.cloudStatusMsg ? `<div class="alert ${state.cloudStatus==='ok' ? 'alert-ok':''}">${state.cloudStatusMsg}</div>` : ''}

      <div class="form-row">
        <div class="field-block">
          <label>Project URL</label>
          <input type="text" id="c-url" placeholder="https://xxxxx.supabase.co" value="${state.cloudUrl}">
        </div>
      </div>
      <div class="form-row">
        <div class="field-block">
          <label>Anon public key</label>
          <input type="text" id="c-key" placeholder="eyJhbGciOi..." value="${state.cloudKey}">
        </div>
      </div>
      <button class="submit-btn" onclick="onSaveCloud()" ${state.cloudStatus==='testing' ? 'disabled':''}>
        ${state.cloudStatus==='testing' ? 'Conectando...' : (connected ? 'Guardar y reconectar' : 'Conectar')}
      </button>
    </div>
  `;
  overlay.onclick = (ev)=>{ if(ev.target === overlay) closeCloud(); };
}

loadState();

// Seguro final: si por cualquier motivo la carga no responde, muestra igual la app
setTimeout(()=>{
  if(!state.loaded){
    state.loaded = true;
    render();
  }
}, 5000);

function openHistory(){
  state.historyOpen = true;
  render();
}
function closeHistory(){
  state.historyOpen = false;
  const overlay = document.getElementById('history-overlay');
  if(overlay) overlay.remove();
  render();
}
function onHistorySearch(value){
  state.historySearch = value;
  const listEl = document.getElementById('history-list');
  if(listEl) listEl.innerHTML = buildHistoryListHTML();
}

function buildHistoryListHTML(){
  const todayKey = dateKey(today.getFullYear(), today.getMonth(), today.getDate());
  const dayNamesLong = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
  const term = state.historySearch.trim().toLowerCase();

  let keys = Object.keys(state.reservas).filter(k => k < todayKey && getDay(k).length > 0);
  keys.sort().reverse(); // más reciente primero

  let blocks = '';
  keys.forEach(key=>{
    let entries = getDay(key).slice().sort((a,b)=>sortKey(a)-sortKey(b));
    if(term){
      entries = entries.filter(e =>
        (e.nombre||'').toLowerCase().includes(term) ||
        (e.observacion||'').toLowerCase().includes(term)
      );
    }
    if(entries.length === 0) return;

    const [y,m,d] = key.split('-').map(Number);
    const dateObj = new Date(y, m-1, d);
    const label = `${dayNamesLong[dateObj.getDay()]} ${d} ${MESES[m-1]} ${y}`;

    blocks += `
      <div class="history-day">
        <div class="history-day-head">${label}</div>
        ${entries.map(e=>`
          <div class="history-trip">
            <div class="history-trip-line"><b>${e.nombre}</b> — <span class="history-trip-times">${fmtTrip(e, fmt12)}</span></div>
            ${e.observacion ? `<div class="history-trip-obs">${e.observacion}</div>` : ''}
          </div>
        `).join('')}
      </div>`;
  });

  if(!blocks){
    return `<div class="week-empty">${term ? 'No hay resultados para esa búsqueda.' : 'Todavía no hay días pasados con viajes registrados.'}</div>`;
  }
  return blocks;
}

function renderHistoryModal(){
  let overlay = document.getElementById('history-overlay');
  if(!overlay){
    overlay = document.createElement('div');
    overlay.id = 'history-overlay';
    overlay.className = 'overlay';
    document.body.appendChild(overlay);
  }

  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-head">
        <div>
          <div class="modal-title">Historial</div>
          <div style="font-size:12px; color:var(--ink-soft); margin-top:2px;">Consulta qué pasó en cualquier día ya utilizado</div>
        </div>
        <button class="close-btn" onclick="closeHistory()">✕</button>
      </div>
      <input class="history-search" id="history-search-input" type="text" placeholder="Buscar por nombre o por observación..." value="${state.historySearch}" oninput="onHistorySearch(this.value)">
      <div id="history-list">${buildHistoryListHTML()}</div>
    </div>
  `;
  overlay.onclick = (ev)=>{ if(ev.target === overlay) closeHistory(); };
  const input = document.getElementById('history-search-input');
  if(input) input.focus({preventScroll:true});
}
</script>
